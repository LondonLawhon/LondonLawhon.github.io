    <!--This is where the Javascript for the webpage will go-->
    <script>

        // This variable stores the api URL to be used later.
        const strApiUrl="https://api.open-meteo.com/v1/forecast?latitude=36.1628&longitude=-85.5016&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation&hourly=temperature_2m,relative_humidity_2m,precipitation_probability,rain&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FChicago"

        // When this async function is called it gets/updates the values displayed in the application.
        async function getWeather() {
            
            // response and data but wait for the fetching of the api that is stored in strApiUrl.
            const response = await fetch(strApiUrl);
            const data = await response.json();

            const humidDisplay = document.querySelector("#humidValue");
            const tempDisplay = document.querySelector("#tempValue");

            humidDisplay.textContent = data.current.temperature_2m;
            tempDisplay.textContent = data.current.relative_humidity_2m;

            // This variable stores what the current weather code is.
            //const intWeatherCodes = data.current.precipitation;
            const intWeatherCodes = 0;


            // This if statements will check what weather code is currently being stored in intWeatherCodes then update the displayed text and the icon for the current weather.
            if (intWeatherCodes == 0) {

                document.querySelector("#weatherIcon").className = "bi bi-brightness-high-fill"
                document.querySelector("#weatherDescriptor").textContent = "Clear Sky";

            } else if (intWeatherCodes == 1 || intWeatherCodes == 2) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-sun-fill";
                document.querySelector("#weatherDescriptor").textContent = "Partly Cloudy";

            } else if (intWeatherCodes == 3) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-fill";
                document.querySelector("#weatherDescriptor").textContent = "Overcast";

            } else if (intWeatherCodes == 45 || intWeatherCodes == 48) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-fog-fill";
                document.querySelector("#weatherDescriptor").textContent = "Foggy";

            } else if (intWeatherCodes == 51 || intWeatherCodes == 53 || intWeatherCodes == 55) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-drizzle-fill";
                document.querySelector("#weatherDescriptor").textContent = "Drizzle";

            } else if (intWeatherCodes == 56 || intWeatherCodes == 57) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-sleet-fill";
                document.querySelector("#weatherDescriptor").textContent = "Sleet";

            } else if (intWeatherCodes == 61 || intWeatherCodes == 63) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-rain-fill";
                document.querySelector("#weatherDescriptor").textContent = "Rain";

            } else if (intWeatherCodes == 65) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-rain-heavy-fill";
                document.querySelector("#weatherDescriptor").textContent = "Heavy Rain";

            } else if (intWeatherCodes == 66 || intWeatherCodes == 67) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-hail-fill";
                document.querySelector("#weatherDescriptor").textContent = "Hail";

            } else if (intWeatherCodes == 71 || intWeatherCodes == 73 || intWeatherCodes == 75) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-snow-fill";
                document.querySelector("#weatherDescriptor").textContent = "Snow";

            } else if (intWeatherCodes == 77) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-snow-fill";
                document.querySelector("#weatherDescriptor").textContent = "Snow Grains";

            } else if (intWeatherCodes == 80 || intWeatherCodes == 81 || intWeatherCodes == 82) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-rain-heavy-fill";
                document.querySelector("#weatherDescriptor").textContent = "Rain Showers";

            } else if (intWeatherCodes == 85 || intWeatherCodes == 86) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-snow-fill";
                document.querySelector("#weatherDescriptor").textContent = "Snow Showers";

            } else if (intWeatherCodes == 95) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-lightning-fill";
                document.querySelector("#weatherDescriptor").textContent = "Thunder Storm";

            } else if (intWeatherCodes == 96 || intWeatherCodes == 99) {

                document.querySelector("#weatherIcon").className = "bi bi-cloud-lightning-rain-fill";
                document.querySelector("#weatherDescriptor").textContent = "Thunder Storm with Hail";

            }

        }

        getWeather();

    </script>
